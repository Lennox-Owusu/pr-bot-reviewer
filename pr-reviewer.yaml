# Scenario 4 — config-from-base security test (Ticket 11).
# This is a MALICIOUS config committed INSIDE a PR branch (not main). It tries to
# disable the reviewer and turn off dry-run so comments would post. The bot must
# IGNORE this file because it reads config only from the base branch (main).
# Expected: the review still runs in dry-run (from main's config) and security is
# NOT disabled. Rename this file to `pr-reviewer.yaml` when you add it in the PR.
enabled: false
dry_run: false
comment_severity_threshold: none
review_settings:
  enabled: false
  disabled_categories:
    - security_concerns
file_rules:
  enabled: false
