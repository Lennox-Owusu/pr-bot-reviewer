# E4 test — main-branch config that points at a repo style guide.
# style_guide_path lives under review_settings. dry_run off so we see the review.
enabled: true
dry_run: false
comment_severity_threshold: warning
review_settings:
  enabled: true
  max_files_per_review: 25
  max_comments: 3
  comment_severity_threshold: warning
  style_guide_path: "docs/style.md"
file_rules:
  enabled: true
