# F3 test — config for a NON-MAIN base branch. Distinctive marker: dry_run: true.
# If the bot reads config from this (the PR's actual base branch), the review runs
# in dry-run and posts nothing. If it posts comments, it wrongly read main's config.
enabled: true
dry_run: true
comment_severity_threshold: warning
review_settings:
  enabled: true
  max_files_per_review: 25
  max_comments: 10
  comment_severity_threshold: warning
file_rules:
  enabled: true
